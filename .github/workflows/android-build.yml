# Android 构建工作流
# 手动触发，支持选择分支和构建变体

name: Android 构建

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '输入分支名称（如 master, main, develop）'
        required: true
        default: 'master'
        type: string
      flavor:
        description: '选择构建变体'
        required: true
        default: 'standard'
        type: choice
        options:
          - standard
          - optimized
          - legacy
          - chromeos
      build_type:
        description: '选择构建类型'
        required: true
        default: 'RelWithDebInfo'
        type: choice
        options:
          - Release
          - RelWithDebInfo
          - Debug
      enable_nightly:
        description: '启用夜间构建模式'
        required: false
        default: 'false'
        type: boolean
      enable_release:
        description: '启用发布模式（含更新检查器）'
        required: false
        default: 'false'
        type: boolean
      enable_ccache:
        description: '启用编译缓存'
        required: false
        default: 'true'
        type: boolean

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '36'
  ANDROID_BUILD_TOOLS_VERSION: '36.0.0'
  ANDROID_NDK_VERSION: '28.2.13676358'
  GRADLE_VERSION: '8.13'
  CMAKE_VERSION: '3.22.1'

jobs:
  build-android:
    name: 构建 Android APK（${{ github.event.inputs.flavor }} - ${{ github.event.inputs.build_type }}）
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      # 检出代码
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          submodules: recursive
          lfs: false
          fetch-depth: 1
          persist-credentials: false

      # 设置 Python
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 安装依赖
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            wget \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            libncurses6 \
            libsdl2-dev \
            zlib1g-dev \
            libgl1-mesa-dev \
            ccache \
            ninja-build

      # 配置 Java 环境
      - name: 配置 Java 环境
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "PATH=$JAVA_HOME/bin:$PATH" >> $GITHUB_ENV
          java -version

      # 配置 Android SDK
      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools: ${{ env.ANDROID_BUILD_TOOLS_VERSION }}
          ndk-version: ${{ env.ANDROID_NDK_VERSION }}
          cmake-version: ${{ env.CMAKE_VERSION }}

      # 配置 ccache
      - name: 配置 ccache
        if: ${{ github.event.inputs.enable_ccache == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: android-${{ github.run_id }}
          restore-keys: android-

      - name: 初始化 ccache
        if: ${{ github.event.inputs.enable_ccache == 'true' }}
        run: |
          ccache -M 2G
          ccache -z
          echo "CCACHE=true" >> $GITHUB_ENV

      # 构建 APK - 直接使用原始构建脚本的方式
      - name: 构建 Android APK
        working-directory: src/android
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: |
          # 计算并行任务数
          NUM_JOBS=$(nproc 2>/dev/null || getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
          export CMAKE_BUILD_PARALLEL_LEVEL="${NUM_JOBS}"
          
          # 映射构建变体
          case "${{ github.event.inputs.flavor }}" in
            standard) FLAVOR="Mainline" ;;
            optimized) FLAVOR="GenshinSpoof" ;;
            legacy) FLAVOR="Legacy" ;;
            chromeos) FLAVOR="ChromeOS" ;;
            *) FLAVOR="Mainline" ;;
          esac
          
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          
          # 准备参数
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.enable_nightly }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS -n"
          fi
          if [ "${{ github.event.inputs.enable_release }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS -r"
          fi
          
          if [ "${{ github.event.inputs.enable_nightly }}" = "true" ]; then
            NIGHTLY=true
          else
            NIGHTLY=false
          fi
          
          # 给予 gradlew 执行权限
          chmod +x ./gradlew
          
          echo "=========================================="
          echo "开始构建..."
          echo "分支: ${{ github.event.inputs.branch }}"
          echo "变体: ${{ github.event.inputs.flavor }} ($FLAVOR)"
          echo "类型: $BUILD_TYPE"
          echo "夜间构建: $NIGHTLY"
          echo "发布模式: ${{ github.event.inputs.enable_release }}"
          echo "CCache: ${{ github.event.inputs.enable_ccache }}"
          echo "并行任务数: $NUM_JOBS"
          echo "=========================================="
          
          # 执行构建（使用与原始构建脚本相同的命令）
          ./gradlew "copy${FLAVOR}${BUILD_TYPE}Outputs" \
            -Dorg.gradle.caching="${{ github.event.inputs.enable_ccache }}" \
            -Dorg.gradle.parallel="${{ github.event.inputs.enable_ccache }}" \
            -Dorg.gradle.workers.max="${NUM_JOBS}" \
            -PYUZU_ANDROID_ARGS="$EXTRA_ARGS" \
            -Pnightly="$NIGHTLY" \
            --info

      # 显示 ccache 统计
      - name: 显示构建统计
        if: ${{ github.event.inputs.enable_ccache == 'true' }}
        run: |
          ccache -s

      # 准备产物
      - name: 准备产物
        working-directory: src/android
        run: |
          mkdir -p ../artifacts
          
          # 复制构建产物
          if [ -d "artifacts" ]; then
            find artifacts -name "*.apk" -exec cp {} ../artifacts/ \; 2>/dev/null || true
            find artifacts -name "*.aab" -exec cp {} ../artifacts/ \; 2>/dev/null || true
          fi
          
          echo "=========================================="
          echo "构建产物列表："
          ls -lh ../artifacts/
          echo "=========================================="

      # 上传构建产物
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.event.inputs.flavor }}-${{ github.event.inputs.build_type }}-${{ github.run_number }}
          path: artifacts/*.apk
          retention-days: 30
          compression-level: 9

      # 生成构建信息
      - name: 生成构建信息
        run: |
          BUILD_INFO="构建信息.txt"
          cat > "$BUILD_INFO" << EOF
          ========================================
          Android 构建报告
          ========================================
          
          基本信息
          --------
          构建编号: ${{ github.run_number }}
          构建ID: ${{ github.run_id }}
          触发时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          
          分支信息
          --------
          构建分支: ${{ github.event.inputs.branch }}
          提交SHA: ${{ github.sha }}
          
          构建配置
          --------
          构建变体: ${{ github.event.inputs.flavor }}
          构建类型: ${{ github.event.inputs.build_type }}
          夜间构建: ${{ github.event.inputs.enable_nightly }}
          发布模式: ${{ github.event.inputs.enable_release }}
          编译缓存: ${{ github.event.inputs.enable_ccache }}
          
          环境信息
          --------
          Android SDK: ${{ env.ANDROID_COMPILE_SDK }}
          Android NDK: ${{ env.ANDROID_NDK_VERSION }}
          Java 版本: OpenJDK 17
          
          ========================================
          EOF
          
          echo "$BUILD_INFO"

      # 上传构建信息
      - name: 上传构建信息
        uses: actions/upload-artifact@v4
        with:
          name: android-build-info-${{ github.run_number }}
          path: 构建信息.txt
          retention-days: 30

  # 通知构建完成
  build-complete:
    name: 构建完成
    needs: build-android
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: 检查构建状态
        run: |
          if [ "${{ needs.build-android.result }}" = "success" ]; then
            echo "✓ Android 构建成功完成"
            echo ""
            echo "构建产物已上传至 Actions Artifacts"
            echo "您可以在 'Actions' -> '${{ github.workflow }}' -> '${{ github.run_number }}' 中下载"
          else
            echo "✗ Android 构建失败"
            echo "请查看构建日志以获取详细信息"
            exit 1
          fi
